<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página Interativa com Animações</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="roses"></div>

  <div class="content">
    <div class="heart">
      <p>
        Este projeto demonstra a criação de uma página web interativa utilizando animações,
        imagens e integração com mídia. O objetivo é apresentar conceitos de front-end,
        incluindo layout, estilização com CSS e manipulação do DOM com JavaScript.
      </p>
    </div>

    <div class="photos">
      <img src="img/javascript.png">
      <img src="img/print.png">
    </div>

    <div class="music">
      <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/track/2psRActEWsTlYYd7EDoyVR"
        width="100%"
        height="152"
        frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
      </iframe>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
